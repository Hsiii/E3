<!DOCTYPE html>
<html>
<head>
  <title>NYCU Portal Credentials</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
      color: #212121;
    }
    .container {
      width: 300px;
      margin: 10px auto;
      background-color: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h2 {
      margin-top: 0;
      font-size: 1.25rem;
      color: #003a8c;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-size: 0.85rem;
      color: #595959;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 1rem;
    }
    input:focus {
      outline: none;
      border-color: #1890ff;
      box-shadow: 0 0 4px rgba(24, 144, 255, 0.2);
    }
    .btn {
      width: 100%;
      padding: 10px;
      background-color: #003a8c;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
      transition: background-color 0.2s ease;
    }
    .btn:hover {
      background-color: #002766;
    }
    .message {
      margin-top: 10px;
      font-size: 0.85rem;
      text-align: center;
      display: none;
    }
    .message.success {
      color: #52c41a;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>NYCU Credentials</h2>
    <div class="form-group">
      <label for="username">Username / ID Card</label>
      <input type="text" id="username" placeholder="Enter username">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password">
    </div>
    <button id="save" class="btn">Save Credentials</button>
    <p id="message" class="message"></p>
  </div>
  <script src="options.js"></script>
</body>
</html>
