<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EZE3 | Configuration</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

    :root {
      --primary: rgb(241, 168, 86);
      --primary-hover: #e09645;
      --bg-dark: #0f172a;
      --card-bg: rgba(255, 255, 255, 0.05);
      --text: #ffffff;
      --text-muted: #94a3b8;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--bg-dark);
      background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 400px; /* Standard browser action width */
    }

    .container {
      width: 100%;
      max-width: 340px;
      padding: 32px;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    header {
      text-align: center;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      color: var(--primary);
    }

    p.subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin: 4px 0 0;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      transition: all 0.2s ease;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 4px rgba(241, 168, 86, 0.1);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background-color: var(--primary);
      color: #000; /* Contrast with the yellow/orange */
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.2s;
      margin-top: 8px;
    }

    .btn:hover {
      background-color: var(--primary-hover);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      font-size: 0.875rem;
      text-align: center;
      display: none;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.success {
      display: block;
      background: rgba(34, 197, 94, 0.1);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }

    .message.error {
      display: block;
      background: rgba(239, 68, 68, 0.1);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    footer {
      margin-top: 24px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>EZE3</h1>
      <p class="subtitle">NYCU Portal Automation</p>
    </header>

    <div class="form-control">
      <div class="form-group">
        <label for="username">Username / Student ID</label>
        <input type="text" id="username" placeholder="Student ID" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Portal Password">
      </div>
      <button id="save" class="btn">Deploy Credentials</button>
    </div>

    <div id="message" class="message"></div>

    <footer>
      Credentials are stored locally and securely.
    </footer>
  </div>
  <script src="options.js"></script>
</body>
</html>
