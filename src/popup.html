<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EZE3</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="logo">EZE3</div>
  
  <div class="form-group">
    <label data-i18n="labelUsername">Username</label>
    <input type="text" id="username" data-i18n-placeholder="placeholderUsername">
  </div>

  <div class="form-group">
    <label data-i18n="labelPassword">Password</label>
    <div class="password-field">
      <input type="password" id="password" data-i18n-placeholder="placeholderPassword">
      <button
        type="button"
        id="togglePassword"
        class="password-toggle"
        data-visible="false"
        aria-label="Show password"
        title="Show password"
      >
        <i data-lucide="eye" class="password-icon-show"></i>
        <i data-lucide="eye-closed" class="password-icon-hide"></i>
      </button>
    </div>
  </div>

  <div id="message" class="message"></div>

  <div class="button-group">
    <button id="close" data-i18n="btnClose">Close</button>
    <button id="save" data-i18n="btnSave">Save</button>
  </div>

  <script src="vendor/lucide.min.js"></script>
  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
